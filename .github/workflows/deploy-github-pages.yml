name: Deploy winter driving lesson to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Option A: GitHub Actions Pages (requires Settings → Pages → GitHub Actions)
      - name: Try deploy via GitHub Actions Pages
        id: pages
        continue-on-error: true
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        if: steps.pages.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: winter-driving-lesson

      - name: Deploy to GitHub Pages (Actions)
        if: steps.pages.outcome == 'success'
        uses: actions/deploy-pages@v4

      # Option B: gh-pages branch (requires Settings → Pages → branch gh-pages / root)
      - name: Deploy to gh-pages branch
        if: steps.pages.outcome != 'success'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./winter-driving-lesson
          publish_branch: gh-pages
          force_orphan: true
